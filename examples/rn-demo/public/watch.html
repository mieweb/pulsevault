<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PulseVault watch</title>
    <style>
      :root { font-family: system-ui, sans-serif; background: #0f1419; color: #e6edf3; }
      body { max-width: 56rem; margin: 1.25rem auto; padding: 0 1rem; line-height: 1.5; }
      .top { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; flex-wrap: wrap; }
      .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1rem 1.25rem; margin-top: 0.9rem; }
      .mono { font-family: ui-monospace, monospace; font-size: 0.78rem; word-break: break-all; color: #8b949e; }
      .btn { border: 1px solid #30363d; border-radius: 6px; background: #1f6feb; color: #fff; padding: 0.4rem 0.8rem; font-size: 0.84rem; cursor: pointer; }
      .btn.ghost { background: #161b22; color: #8b949e; }
      .player { width: 100%; max-height: 70vh; border-radius: 8px; background: #000; object-fit: contain; }
      .row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.6rem; }
      pre { white-space: pre-wrap; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 0.75rem; max-height: 18rem; overflow: auto; }
      a { color: #58a6ff; }
    </style>
  </head>
  <body>
    <div class="top">
      <strong>Standalone watch page</strong>
      <a href="/">← Back to demo</a>
    </div>

    <div class="card">
      <video id="player" class="player" controls preload="metadata" playsinline></video>
      <div class="row">
        <button id="copyLink" class="btn">Copy share URL at current time</button>
        <button id="refreshLogs" class="btn ghost">Refresh logs</button>
      </div>
      <p id="status" class="mono" style="margin-top: 0.6rem;">Loading player…</p>
      <p class="mono" id="meta"></p>
    </div>

    <div class="card">
      <strong>Recent GET logs for this video</strong>
      <p class="mono">Open browser devtools console to see live request logs printed as well.</p>
      <pre id="logs">No logs yet.</pre>
    </div>

    <script>
      const VIDEO_ID = "__VIDEOID__";
      const BASE_VIDEO_SRC = "__VIDEO_SRC__";

      const player = document.getElementById("player");
      const statusEl = document.getElementById("status");
      const metaEl = document.getElementById("meta");
      const logsEl = document.getElementById("logs");

      let lastSeenAt = null;
      let logsTimer = null;
      let syncTimer = null;

      function getSearchParams() {
        return new URLSearchParams(window.location.search);
      }

      function getStartSeconds() {
        const params = getSearchParams();
        const t = Number(params.get("t"));
        if (!Number.isFinite(t) || t < 0) return 0;
        return t;
      }

      function buildVideoSrc() {
        const params = getSearchParams();
        const token = params.get("token");
        if (!token) return BASE_VIDEO_SRC;
        return `${BASE_VIDEO_SRC}?token=${encodeURIComponent(token)}`;
      }

      function setStatus(text) {
        statusEl.textContent = `${new Date().toLocaleTimeString()} | ${text}`;
      }

      function updateUrlTime() {
        if (!Number.isFinite(player.currentTime)) return;
        const params = getSearchParams();
        params.set("t", String(Math.max(0, Math.floor(player.currentTime))));
        const next = `${window.location.pathname}?${params.toString()}`;
        window.history.replaceState(null, "", next);
      }

      async function copyShareUrl() {
        updateUrlTime();
        await navigator.clipboard.writeText(window.location.href);
        setStatus("Copied share URL with current time.");
      }

      async function refreshLogs() {
        const res = await fetch(`/range-logs?videoid=${encodeURIComponent(VIDEO_ID)}`);
        const logs = await res.json();
        if (!Array.isArray(logs) || logs.length === 0) {
          logsEl.textContent = "No logs yet. Hit play or scrub the timeline.";
          return;
        }

        const recent = logs.slice(-20);
        const lines = recent
          .slice()
          .reverse()
          .map((item) => [
            `${item.at} | ${item.method} ${item.url}`,
            `  status=${item.status}`,
            `  range=${item.range || "<none>"}`,
            `  content-range=${item.contentRange || "<none>"}`,
            `  content-length=${item.contentLength || "<none>"}`,
          ].join("\n"));

        logsEl.textContent = lines.join("\n\n");

        for (const item of recent) {
          if (lastSeenAt && item.at <= lastSeenAt) continue;
          console.log("[watch/range-log]", item);
        }
        lastSeenAt = recent[recent.length - 1]?.at || lastSeenAt;
      }

      function startTimers() {
        if (!logsTimer) {
          logsTimer = setInterval(() => {
            refreshLogs().catch(() => {});
          }, 1200);
        }
        if (!syncTimer) {
          syncTimer = setInterval(() => {
            if (!player.paused) updateUrlTime();
          }, 1000);
        }
      }

      function initPlayer() {
        const startAt = getStartSeconds();
        player.src = buildVideoSrc();
        player.load();

        player.addEventListener("loadedmetadata", () => {
          const maxSeek = Math.max(0, player.duration - 0.05);
          const seekTo = Math.min(startAt, maxSeek);
          if (seekTo > 0) player.currentTime = seekTo;
          setStatus(`Ready. duration=${player.duration.toFixed(2)}s, start=${seekTo.toFixed(2)}s`);
          metaEl.textContent = `videoid=${VIDEO_ID} | src=${player.currentSrc}`;
        });

        player.addEventListener("play", () => {
          setStatus("Playing");
        });

        player.addEventListener("seeking", () => {
          setStatus(`Seeking to ${player.currentTime.toFixed(2)}s`);
        });

        player.addEventListener("seeked", () => {
          updateUrlTime();
          setStatus(`Seeked to ${player.currentTime.toFixed(2)}s`);
          refreshLogs().catch(() => {});
        });

        player.addEventListener("pause", () => {
          updateUrlTime();
          setStatus(`Paused at ${player.currentTime.toFixed(2)}s`);
        });

        player.addEventListener("error", () => {
          setStatus("Player error. Check console + server logs.");
        });
      }

      document.getElementById("copyLink").addEventListener("click", () => {
        copyShareUrl().catch((err) => {
          setStatus(`Copy failed: ${err?.message || String(err)}`);
        });
      });
      document.getElementById("refreshLogs").addEventListener("click", () => {
        refreshLogs().catch(() => {});
      });

      initPlayer();
      startTimers();
      refreshLogs().catch(() => {});
    </script>
  </body>
</html>
